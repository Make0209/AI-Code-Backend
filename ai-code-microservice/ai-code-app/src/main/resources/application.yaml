spring:
  #   应用名称
  application:
    name: ai-code-app
  #    MySQL配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/ai_code
    username: root
    password: 1234
  #    Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 1234
  #  开启本地配置文件
  profiles:
    active: local
#    服务器配置
server:
  port: 8128
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.hbpu.aicodebackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
# Dubbo
dubbo:
  application:
    name: ai-code-app
    qos-enable: false
  registry:
    address: nacos://127.0.0.1:8848?username=nacos&password=nacos
    register-mode: instance
  protocol:
    name: tri
    port: 50053
  consumer:
    timeout: 120000
  provider:
    timeout: 120000

