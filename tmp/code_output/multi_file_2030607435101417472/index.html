<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务记录网站</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-tasks"></i> 任务记录</h1>
            <p class="subtitle">记录您的每日任务，提高工作效率</p>
        </header>

        <main class="main-content">
            <section class="task-input-section">
                <div class="input-container">
                    <input 
                        type="text" 
                        id="taskInput" 
                        placeholder="请输入新任务..." 
                        maxlength="100"
                    >
                    <button id="addTaskBtn" class="btn btn-primary">
                        <i class="fas fa-plus"></i> 添加任务
                    </button>
                </div>
                <div class="task-stats">
                    <span id="totalTasks">总任务: 0</span>
                    <span id="completedTasks">已完成: 0</span>
                    <span id="pendingTasks">待完成: 0</span>
                </div>
            </section>

            <section class="task-filters">
                <button class="filter-btn active" data-filter="all">全部任务</button>
                <button class="filter-btn" data-filter="pending">待完成</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
            </section>

            <section class="tasks-section">
                <h2><i class="fas fa-list-check"></i> 任务列表</h2>
                <div class="tasks-container">
                    <ul id="tasksList">
                        <!-- 任务将通过JavaScript动态添加 -->
                        <li class="empty-message">
                            <i class="fas fa-clipboard-list"></i>
                            <p>暂无任务，请添加您的第一个任务！</p>
                        </li>
                    </ul>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>任务记录网站 &copy; <span id="currentYear"></span> - 使用本地存储保存您的任务</p>
        </footer>
    </div>

    <!-- 编辑任务模态框 -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑任务</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="editTaskInput" placeholder="编辑任务内容..." maxlength="100"></textarea>
            </div>
            <div class="modal-footer">
                <button id="cancelEditBtn" class="btn btn-secondary">取消</button>
                <button id="saveEditBtn" class="btn btn-primary">保存更改</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
