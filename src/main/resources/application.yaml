spring:
  application:
    name: AICodeBackend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/ai_code
    username: root
    password: 1234
  data:
    redis:
      host: localhost
      port: 6379
      password: 1234
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.hbpu.aicodebackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
