global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: prod
    instance: 39.104.71.62

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["127.0.0.1:9090"]

  - job_name: ai-code-backend
    metrics_path: /api/actuator/prometheus
    scrape_interval: 10s
    scrape_timeout: 10s
    static_configs:
      - targets: ["127.0.0.1:8123"]
        labels:
          app: AICodeBackend
